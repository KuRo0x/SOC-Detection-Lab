title: Suspicious Process Accessing LSASS Memory
id: 32d0d3e2-e58d-4d41-926f-8aa4b01c0a7a
status: stable
description: |
  Detects non-system processes accessing lsass.exe memory, commonly used for credential dumping.
  PATCHED 2026-05-05: Added explicit allow-list for rundll32.exe and comsvcs.dll after confirmed
  evasion test showed the original filter_system block excluded C:\Windows\System32\rundll32.exe.
  comsvcs.dll MiniDump via rundll32 fired 7 Sysmon Event 10 events and was NOT caught by v1.
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://lolbas-project.github.io/lolbas/Libraries/comsvcs/
author: KuRo (vSOC-Lab)
date: 2026/05/05
modified: 2026/05/05
logsource:
    product: windows
    category: process_access
detection:
    selection_lsass:
        EventID: 10
        TargetImage|endswith: '\lsass.exe'
        GrantedAccess|contains:
            - '0x1410'
            - '0x1FFFFF'
            - '0x1010'
            - '0x1438'
            - '0x1000'
    # Explicitly block known LOLBins that live inside System32
    # These were confirmed evasion paths in lab testing
    filter_lolbin_exception:
        SourceImage|endswith:
            - '\rundll32.exe'
    # Block legitimate Windows processes that genuinely need LSASS access
    filter_known_good:
        SourceImage|endswith:
            - '\svchost.exe'
            - '\wininit.exe'
            - '\csrss.exe'
            - '\MsMpEng.exe'
            - '\wmiprvse.exe'
            - '\vmtoolsd.exe'
            - '\taskmgr.exe'
            - '\WerFault.exe'
    # Safe system paths — only after removing rundll32 from the allow-list above
    filter_system_safe:
        SourceImage|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
            - 'C:\Program Files\Windows Defender\'
            - 'C:\ProgramData\Microsoft\Windows Defender\'
    condition: selection_lsass and not (filter_system_safe and not filter_lolbin_exception) and not filter_known_good
falsepositives:
    - Legitimate security software using memory introspection
    - Authorized crash dump collection via Task Manager
    - Backup software with memory access from approved paths
level: high
tags:
    - attack.credential_access
    - attack.t1003.001
    - attack.t1003
    - attack.defense_evasion
    - attack.t1218.011
