# ============================================================
# Sigma Rule: T1136.001 – Local Admin Account Creation
# ============================================================
# Author:    KuRo | SOC Detection Lab
# Date:      2026-04-28
# Version:   1.0
# Reference: https://attack.mitre.org/techniques/T1136/001/
# ============================================================

title: Local Account Created and Added to Administrators
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: >
  Detects the creation of a new local user account (Event ID 4720) followed
  by that account being added to the local Administrators group (Event ID 4732)
  on the same host within a short time window. Maps to MITRE ATT&CK T1136.001.
author: KuRo
date: 2026-04-28
modified: 2026-04-28
tags:
  - attack.persistence
  - attack.t1136.001
  - attack.privilege_escalation
logsource:
  product: windows
  service: security

# ---------------------------------------------------------------
# Detection 1: Account creation event
# ---------------------------------------------------------------
detection:
  selection_create:
    EventID: 4720
    # Exclude known service account prefixes (adjust to your environment)
    TargetUserName|not_startswith:
      - 'SVC-'
      - 'IT-ADM-'
      - 'svc_'

  # ---------------------------------------------------------------
  # Detection 2 (separate rule): Added to Administrators group
  # Pair this with the creation event in your SIEM correlation
  # ---------------------------------------------------------------
  selection_group_add:
    EventID: 4732
    TargetUserName: 'Administrators'

  # ---------------------------------------------------------------
  # Reduce false positives: exclude known admin accounts
  # ---------------------------------------------------------------
  filter_known_admins:
    SubjectUserName|endswith: '$'          # Machine accounts
  filter_system:
    SubjectUserName: 'SYSTEM'

  condition: (selection_create or selection_group_add) and not (filter_known_admins or filter_system)

falsepositives:
  - Legitimate IT provisioning of new admin accounts
  - Software installation that creates service accounts
  - Scripted onboarding processes

level: high

fields:
  - EventID
  - SubjectUserName
  - SubjectDomainName
  - SubjectLogonId
  - TargetUserName
  - TargetSid
  - GroupName
  - MemberName

