title: Local Admin Account Creation Outside Business Hours
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: >
  Detects new local account creation (4720) AND group membership to Administrators (4732)
  occurring outside typical business hours (18:00–08:00) or weekends.
  High-confidence detection for unauthorized persistence attempts.
author: KuRo
date: 2026-04-28
tags:
  - attack.persistence
  - attack.t1136.001
  - attack.privilege_escalation
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID:
      - 4720
      - 4732
  filter_business_hours:
    # Adjust to your organization's timezone and hours
    # Splunk/Elastic handle time-based filtering in the query layer
    SubjectUserName|contains:
      - '$'
  condition: selection and not filter_business_hours

falsepositives:
  - After-hours legitimate admin work with approved change ticket

level: high

---

title: Suspicious Local Account Naming Pattern
id: c3d4e5f6-a7b8-9012-cdef-012345678902
status: experimental
description: >
  Detects creation of local accounts with suspicious naming conventions
  that may indicate attacker-created backdoor accounts.
author: KuRo
date: 2026-04-28
tags:
  - attack.persistence
  - attack.t1136.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4720
    TargetUserName|re: '(?i)(temp|test|tmp|admin0|backdoor|hack|sys\$|support_[0-9]{3,}|[a-z]{1,4}[0-9]{4,})'
  condition: selection

falsepositives:
  - Development/test environments
  - Authorized temporary accounts (should still be investigated)

level: medium
